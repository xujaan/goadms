apiVersion: v1
kind: Secret
metadata:
  name: goadms-db
type: Opaque
stringData:
  host: "postgres-host"
  port: "5432"
  username: "postgres"
  password: ""
  name: "adms"
---
apiVersion: v1
kind: Secret
metadata:
  name: goadms-secret
type: Opaque
stringData:
  jwt-secret: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: goadms
  labels:
    app: goadms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goadms
  template:
    metadata:
      labels:
        app: goadms
    spec:
      containers:
      - name: goadms
        image: xujaan/goadms:latest
        ports:
        - containerPort: 8081
        env:
        - name: ADMS_DB_HOST
          valueFrom:
            secretKeyRef:
              name: goadms-db
              key: host
        - name: ADMS_DB_PORT
          valueFrom:
            secretKeyRef:
              name: goadms-db
              key: port
        - name: ADMS_DB_USER
          valueFrom:
            secretKeyRef:
              name: goadms-db
              key: username
        - name: ADMS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: goadms-db
              key: password
        - name: ADMS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: goadms-db
              key: name
        - name: ADMS_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: goadms-secret
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: goadms
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: goadms
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goadms
spec:
  rules:
  - host: adms.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: goadms
            port:
              number: 8081
