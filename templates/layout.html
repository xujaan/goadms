<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — ADMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { font-size: .875rem; }
        .sidebar .nav-link { font-weight: 500; color: #adb5bd; padding: .25rem .5rem; }
        .sidebar .nav-link.active { color: #fff; }
        .sidebar .nav-link:hover { color: #fff; }
        .device-card { transition: transform .2s; }
        .device-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 col-lg-2 d-md-block bg-dark-subtle p-3" style="min-height:100vh;font-size:.8rem">
            <h6 class="text-light mb-3"><i class="bi bi-fingerprint"></i> ADMS</h6>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" id="navDash" href="/web/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" id="navDev" href="/web/devices"><i class="bi bi-hdd-rack me-1"></i>Devices</a></li>
                <li class="nav-item"><a class="nav-link" id="navAtt" href="/web/attendance"><i class="bi bi-calendar-check me-1"></i>Attendance</a></li>
                <li class="nav-item"><a class="nav-link" id="navShift" href="/web/shifts"><i class="bi bi-clock me-1"></i>Shifts</a></li>
                <li class="nav-item"><a class="nav-link" id="navReport" href="/web/reports"><i class="bi bi-file-earmark-bar-graph me-1"></i>Reports</a></li>
                <li class="nav-item"><a class="nav-link" id="navFinger" href="/web/fingerprint-users"><i class="bi bi-people me-1"></i>Users</a></li>
                <li class="nav-item"><a class="nav-link" id="navScan" href="/web/scanner"><i class="bi bi-search me-1"></i>Scanner</a></li>
                <li class="nav-item"><a class="nav-link" id="navDU" href="/web/device-users"><i class="bi bi-hdd-stack me-1"></i>Device Users</a></li>
                <li class="nav-item"><a class="nav-link" id="navWH" href="/web/webhooks"><i class="bi bi-link-45deg me-1"></i>Webhooks</a></li>
                <li class="nav-item mt-3"><a class="nav-link text-secondary" onclick="logout()" href="#"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
            </ul>
        </nav>
        <main class="col-md-10 ms-sm-auto col-lg-10 px-md-4 pt-3">
            {{.Content}}
        </main>
    </div>
</div>
<script>
// Global auth guard.
(function(){
    var p=window.location.pathname;
    var token=localStorage.getItem('access_token');
    // Redirect to login if no token and not on login page.
    if(!p.includes('/login')&&!token){window.location.href='/web/login';return}

    // Wrap fetch to auto-redirect on 401.
    var _fetch=window.fetch;
    window.fetch=function(url,opts){
        opts=opts||{};
        opts.headers=opts.headers||{};
        if(token)opts.headers['Authorization']='Bearer '+token;
        return _fetch(url,opts).then(function(r){
            if(r.status===401){localStorage.removeItem('access_token');window.location.href='/web/login';throw new Error('unauthorized')}
            return r;
        });
    };

    // Nav highlight.
    var m={dashboard:'navDash','devices':'navDev','device-users':'navDU',attendance:'navAtt',shift:'navShift',report:'navReport',fingerprint:'navFinger',scanner:'navScan',webhook:'navWH'};
    for(var k in m){if(p.includes(k)){var el=document.getElementById(m[k]);if(el)el.classList.add('active');break}}
})();

function logout(){
    fetch('/api/v1/auth/logout',{method:'POST'}).then(function(){localStorage.clear();window.location.href='/web/login'});
}
</script>
{{.Scripts}}
</body>
</html>
