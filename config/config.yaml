server:
  host: "0.0.0.0"
  port: 8081
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: ""
  name: "adms"
  sslmode: "disable"
  pool_max: 20

auth:
  jwt_secret: ""
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

scheduler:
  online_check_interval: "60s"
  auto_pull_interval: "5m"
  status_ping_interval: "30s"

webhook:
  timeout: "30s"
  retry_max_attempts: 5
  retry_base_delay: "1m"
